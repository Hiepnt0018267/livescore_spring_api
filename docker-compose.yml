version: '3.8'
services:
  mysql-db:
    image: mysql:8.0
    container_name: livescore_mysql
    restart: always
    environment:
      MYSQL_DATABASE: livescore_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: